  <style>
    /* ==================== SPLASH SCREEN ANIMATIONS ==================== */
    @keyframes logoReveal {
      0% { opacity: 0; transform: scale(0.5) rotate(-10deg); }
      50% { opacity: 1; transform: scale(1.1) rotate(5deg); }
      100% { opacity: 1; transform: scale(1) rotate(0deg); }
    }

    @keyframes logoPulse {
      0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(124, 58, 237, 0.7); }
      50% { transform: scale(1.05); box-shadow: 0 0 40px 20px rgba(124, 58, 237, 0); }
    }

    @keyframes textReveal {
      0% { opacity: 0; transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    @keyframes splashFadeOut {
      from { opacity: 1; }
      to { opacity: 0; }
    }

    @keyframes ringExpand {
      0% { transform: scale(0.8); opacity: 0.8; }
      100% { transform: scale(2.5); opacity: 0; }
    }

    @keyframes loginSlideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes shimmerBar {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }

    .splash-logo-reveal {
      animation: logoReveal 1s ease-out forwards;
    }

    .splash-logo-pulse {
      animation: logoPulse 2s ease-in-out infinite;
    }

    .splash-text-reveal {
      animation: textReveal 0.8s ease-out forwards;
    }

    .splash-fade-out {
      animation: splashFadeOut 0.5s ease-out forwards;
    }

    .splash-ring-expand {
      animation: ringExpand 2s ease-out infinite;
    }

    .login-slide-up {
      animation: loginSlideUp 0.5s ease-out forwards;
    }

    .splash-shimmer-bar {
      background: linear-gradient(90deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.4) 50%, rgba(255,255,255,0.1) 100%);
      background-size: 200% 100%;
      animation: shimmerBar 1.5s infinite;
    }
    /* ==================== FIM SPLASH SCREEN ==================== */

    /* Mapa Leaflet - FORÇAR VISIBILIDADE */
    #mapa-calor-leaflet,
    #mapa-clientes-leaflet {
      z-index: 100 !important;
      position: relative !important;
      visibility: visible !important;
      opacity: 1 !important;
      display: block !important;
    }
    #mapa-calor-leaflet *,
    #mapa-clientes-leaflet * {
      visibility: visible !important;
    }
    .leaflet-container {
      z-index: 100 !important;
      background: #fff !important;
    }
    .leaflet-pane {
      z-index: 100 !important;
    }
    .leaflet-tile-pane {
      z-index: 200 !important;
    }
    .leaflet-overlay-pane {
      z-index: 400 !important;
    }
    .leaflet-marker-pane {
      z-index: 600 !important;
    }
    .leaflet-control-container {
      z-index: 800 !important;
    }
    
    /* Emoji Marker para mapa de clientes */
    .emoji-marker {
      background: transparent !important;
      border: none !important;
      cursor: pointer !important;
    }
    .emoji-marker div {
      cursor: pointer !important;
      transition: transform 0.2s ease !important;
    }
    .emoji-marker:hover div,
    .emoji-marker div:hover {
      transform: scale(1.3) !important;
    }
    
    /* Garantir que o popup do Leaflet apareça NA FRENTE */
    .leaflet-popup-pane {
      z-index: 10000 !important;
    }
    .leaflet-popup {
      z-index: 10001 !important;
    }
    .leaflet-popup-content-wrapper {
      border-radius: 12px !important;
      box-shadow: 0 4px 20px rgba(0,0,0,0.25) !important;
      z-index: 10002 !important;
    }
    .leaflet-popup-content {
      margin: 12px !important;
    }
    .leaflet-popup-tip-container {
      z-index: 10001 !important;
    }
    .leaflet-popup-tip {
      box-shadow: 0 3px 10px rgba(0,0,0,0.2) !important;
    }
    
    /* Mapa de clientes container */
    #mapa-clientes-leaflet .leaflet-popup-pane {
      z-index: 10000 !important;
    }
    
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    .toast { animation: slideIn 0.3s ease-out; }
    .row-green { background-color: #dcfce7 !important; border-left: 4px solid #22c55e !important; }
    .row-blue { background-color: #dbeafe !important; border-left: 4px solid #3b82f6 !important; }
    .row-red { background-color: #fee2e2 !important; border-left: 4px solid #ef4444 !important; }
    
    /* 🆕 2026-04-30 REDESIGN: animações da tela de saque do motoboy */
    @keyframes tuttsFadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes tuttsScaleIn {
      from { transform: scale(0.85) translateY(8px); opacity: 0.5; }
      to { transform: scale(1) translateY(0); opacity: 1; }
    }
    @keyframes tuttsRing {
      0% { opacity: 0.7; transform: scale(0.7); }
      100% { opacity: 0; transform: scale(1.5); }
    }
    @keyframes tuttsDraw {
      to { stroke-dashoffset: 0; }
    }
    @keyframes tuttsDrain {
      to { transform: scaleX(0); }
    }
    @keyframes tuttsConfete {
      0% { opacity: 0; transform: translate(0, 0) rotate(0); }
      10% { opacity: 1; }
      100% { opacity: 0; transform: translate(var(--tx, 0), 220px) rotate(var(--rot, 360deg)); }
    }
    
    /* Shimmer animation for loading bar */
    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }
    
    /* Pulse glow effect */
    @keyframes pulseGlow {
      0%, 100% { box-shadow: 0 0 5px rgba(147, 51, 234, 0.5); }
      50% { box-shadow: 0 0 20px rgba(147, 51, 234, 0.8); }
    }
    
    /* PWA Install Banner */
    .pwa-install-banner {
      animation: slideUp 0.5s ease-out;
    }
    @keyframes slideUp {
      from { transform: translateY(100%); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    
    /* Update Banner */
    .update-banner {
      animation: slideDown 0.5s ease-out;
    }
    @keyframes slideDown {
      from { transform: translateY(-100%); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    
    /* Toggle Switch Mobile Optimization */
    button[role="switch"] {
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
      -webkit-touch-callout: none;
      position: relative;
      padding: 12px !important;
    }
    button[role="switch"]:active {
      transform: scale(0.95);
    }
    button[role="switch"] span {
      will-change: transform;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }
    @media (max-width: 768px) {
      button[role="switch"] {
        min-width: 100px !important;
        min-height: 56px !important;
      }
    }

      content:""; position:absolute; inset:0; pointer-events:none; opacity:.05; z-index:0;
      background:linear-gradient(#fff 1px,transparent 1px) 0 0/42px 42px,linear-gradient(90deg,#fff 1px,transparent 1px) 0 0/42px 42px;
      -webkit-mask-image:radial-gradient(75% 70% at 50% 45%,#000,transparent); mask-image:radial-gradient(75% 70% at 50% 45%,#000,transparent);
    }
    .login-slide-up{ position:relative; z-index:1; border-radius:26px !important; box-shadow:0 40px 80px -30px rgba(0,0,0,.55) !important;
      animation:tlg2CardIn .85s .15s cubic-bezier(.16,.84,.3,1) both !important; }
    @keyframes tlg2CardIn{from{opacity:0;transform:translateY(30px) scale(.96)}to{opacity:1;transform:translateY(0) scale(1)}}
    .tlg2-mark{position:relative;width:92px;height:92px;border-radius:24px;margin:0 auto 16px;display:grid;place-items:center;overflow:hidden;
      background:linear-gradient(140deg,#3a1556,#770fa8);box-shadow:0 18px 36px -12px rgba(119,15,168,.65);
      opacity:0;transform:translateY(12px) scale(.8);animation:tlg2MarkIn .8s .45s cubic-bezier(.16,.84,.3,1) forwards, tlg2Floaty 5.5s ease-in-out infinite 1.4s}
    .tlg2-halo{position:absolute;inset:-22%;background:radial-gradient(50% 50% at 50% 55%,rgba(246,118,2,.35),transparent 70%);filter:blur(12px);opacity:0;animation:tlg2HaloIn .6s 1s forwards,tlg2Halo 5s ease-in-out infinite 1.6s}
    .tlg2-logo{width:58px;position:relative;z-index:1}
    .tlg2-shine{position:absolute;inset:0;z-index:2;pointer-events:none;
      -webkit-mask:var(--tlg2-logo) center/64% auto no-repeat;mask:var(--tlg2-logo) center/64% auto no-repeat;
      background:linear-gradient(105deg,transparent 38%,rgba(255,255,255,.92) 49%,rgba(255,236,200,.97) 51%,transparent 62%);background-size:260% 100%;background-position:170% 0;
      animation:tlg2SweepIntro 1.1s 1.15s ease-out, tlg2Sweep 4.5s 3s ease-in-out infinite}
    @keyframes tlg2MarkIn{to{opacity:1;transform:translateY(0) scale(1)}}
    @keyframes tlg2HaloIn{to{opacity:1}}
    @keyframes tlg2SweepIntro{0%{background-position:175% 0;opacity:0}30%{opacity:1}100%{background-position:-75% 0;opacity:0}}
    @keyframes tlg2Sweep{0%{background-position:175% 0;opacity:0}16%{opacity:.95}55%{opacity:.95}72%,100%{background-position:-75% 0;opacity:0}}
    @keyframes tlg2Halo{0%,100%{opacity:.7;transform:scale(1)}50%{opacity:1;transform:scale(1.07)}}
    @keyframes tlg2Floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
    .login-slide-up .text-center h1{opacity:0;animation:tlg2Up .6s .58s forwards}
    .login-slide-up .text-center p{opacity:0;animation:tlg2Up .6s .66s forwards}
    .login-slide-up .space-y-4 > *{opacity:0;animation:tlg2Up .55s forwards}
    .login-slide-up .space-y-4 > *:nth-child(1){animation-delay:.74s}
    .login-slide-up .space-y-4 > *:nth-child(2){animation-delay:.82s}
    .login-slide-up .space-y-4 > *:nth-child(3){animation-delay:.9s}
    .login-slide-up .space-y-4 > *:nth-child(4){animation-delay:.98s}
    .login-slide-up .space-y-4 > *:nth-child(5){animation-delay:1.06s}
    .login-slide-up .space-y-4 > *:nth-child(6){animation-delay:1.12s}
    @keyframes tlg2Up{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    .login-slide-up input{border-radius:13px !important;border-width:1.5px !important;background:#fbf9fe !important;padding-top:.8rem !important;padding-bottom:.8rem !important;transition:.18s}
    .login-slide-up input:focus{border-color:#770fa8 !important;background:#fff !important;box-shadow:0 0 0 4px #f1ebfe !important;outline:none !important}
    .login-slide-up .bg-purple-900{background:linear-gradient(135deg,#770fa8,#5d0b85) !important;border-radius:13px !important;box-shadow:0 16px 30px -12px rgba(119,15,168,.7);transition:transform .15s,box-shadow .15s}
    .login-slide-up .bg-purple-900:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 22px 38px -12px rgba(119,15,168,.85)}
    @media (prefers-reduced-motion:reduce){
      .login-slide-up,.tlg2-mark,.tlg2-halo,.login-slide-up .text-center h1,.login-slide-up .text-center p,.login-slide-up .space-y-4 > *{animation:none !important;opacity:1 !important;transform:none !important}
      .tlg2-shine{display:none}
    }

    /* ===== Tutts splash redesign (2026-06) ===== */
    .tsp-bg{position:absolute;inset:0;z-index:0;overflow:hidden;
      background:#26093a;
      background-image:
        radial-gradient(360px 360px at 58% 12%, rgba(155,31,214,.45), transparent 60%),
        radial-gradient(300px 300px at 90% 90%, rgba(246,118,2,.16), transparent 60%),
        radial-gradient(260px 260px at 6% 60%, rgba(230,0,126,.20), transparent 60%),
        radial-gradient(120% 110% at 50% 0%, #5d0b85 0%, #3a1556 48%, #26093a 100%);
      animation:tspBgIn .8s ease forwards}
    @keyframes tspBgIn{from{opacity:0}to{opacity:1}}
    .tsp-wrap{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;text-align:center}
    .tsp-ring{position:relative;width:168px;height:168px;display:grid;place-items:center;opacity:0;transform:scale(.85);animation:tspIn .8s .1s cubic-bezier(.16,.84,.3,1) forwards}
    .tsp-track{position:absolute;inset:0;border-radius:50%;border:3px solid rgba(255,255,255,.10)}
    .tsp-comet{position:absolute;inset:0;border-radius:50%;
      background:conic-gradient(from 0deg, transparent 0 58%, #f67602 90%, #ffd08a 100%);
      -webkit-mask:radial-gradient(farthest-side, transparent calc(100% - 5px), #000 calc(100% - 5px));
              mask:radial-gradient(farthest-side, transparent calc(100% - 5px), #000 calc(100% - 5px));
      animation:tspSpin 1.4s linear infinite}
    .tsp-mark{position:relative;width:96px;height:96px;border-radius:26px;display:grid;place-items:center;overflow:hidden;
      background:linear-gradient(140deg,#3a1556,#770fa8);box-shadow:0 18px 40px -12px rgba(119,15,168,.7);animation:tspFloaty 4.5s ease-in-out infinite}
    .tsp-halo{position:absolute;inset:-25%;background:radial-gradient(50% 50% at 50% 55%,rgba(246,118,2,.4),transparent 70%);filter:blur(12px);animation:tspHalo 4s ease-in-out infinite}
    .tsp-logo{width:60px;position:relative;z-index:1}
    .tsp-shine{position:absolute;inset:0;z-index:2;pointer-events:none;
      -webkit-mask:var(--tsp-logo) center/64% auto no-repeat;mask:var(--tsp-logo) center/64% auto no-repeat;
      background:linear-gradient(105deg,transparent 40%,rgba(255,255,255,.95) 50%,transparent 60%);background-size:260% 100%;background-position:170% 0;
      animation:tspSweep 2.6s .6s ease-in-out infinite}
    .tsp-title{font-family:'Sora','Inter',sans-serif;font-weight:800;font-size:22px;color:#fff;letter-spacing:-.01em;margin-top:30px;opacity:0;transform:translateY(10px);animation:tspUp .7s .5s forwards}
    .tsp-sub{font-size:13px;color:rgba(255,255,255,.6);margin-top:5px;opacity:0;transform:translateY(10px);animation:tspUp .7s .6s forwards}
    .tsp-load{display:flex;align-items:center;gap:7px;margin-top:26px;font-size:12.5px;font-weight:600;color:#f67602;opacity:0;transform:translateY(10px);animation:tspUp .7s .8s forwards}
    .tsp-dot{width:5px;height:5px;border-radius:50%;background:#f67602;animation:tspBlink 1.2s infinite}
    .tsp-dot:nth-child(2){animation-delay:.2s}.tsp-dot:nth-child(3){animation-delay:.4s}
    @keyframes tspSpin{to{transform:rotate(360deg)}}
    @keyframes tspIn{to{opacity:1;transform:scale(1)}}
    @keyframes tspUp{to{opacity:1;transform:translateY(0)}}
    @keyframes tspFloaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
    @keyframes tspHalo{0%,100%{opacity:.6;transform:scale(1)}50%{opacity:1;transform:scale(1.08)}}
    @keyframes tspSweep{0%{background-position:175% 0;opacity:0}25%{opacity:1}55%{opacity:1}75%,100%{background-position:-75% 0;opacity:0}}
    @keyframes tspBlink{0%,100%{opacity:.25;transform:scale(.8)}50%{opacity:1;transform:scale(1)}}
    @media (prefers-reduced-motion:reduce){.tsp-comet,.tsp-shine,.tsp-dot,.tsp-mark{animation:none !important}.tsp-ring,.tsp-title,.tsp-sub,.tsp-load{opacity:1 !important;transform:none !important}}
    /* fix: splash deve cobrir a tela toda — restaura position:fixed (o override
       do login marcou .from-purple-100.to-purple-200 como relative e, por ter
       mais especificidade que .fixed, derrubava o fixed do splash). So o splash
       tem a classe .fixed, entao o login nao e afetado. */
    .fixed.from-purple-100.to-purple-200{ position:fixed !important; inset:0 !important; }

  <script>
    // PWA Install Prompt
    let deferredPrompt;
    
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      
      // Verificar se já foi dispensado recentemente (7 dias)
      const dismissed = localStorage.getItem('pwa-dismissed');
      if (dismissed && (Date.now() - parseInt(dismissed)) < 7 * 24 * 60 * 60 * 1000) {
        return;
      }
      
      // Mostrar banner apenas se não estiver instalado
      if (!window.matchMedia('(display-mode: standalone)').matches) {
        setTimeout(() => {
          document.getElementById('pwa-install-banner').classList.remove('hidden');
        }, 3000);
      }
    });
    
    document.getElementById('pwa-install-btn')?.addEventListener('click', async () => {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        console.log('PWA install outcome:', outcome);
        deferredPrompt = null;
        document.getElementById('pwa-install-banner').classList.add('hidden');
      }
    });
    
    // Service Worker Registration with Update Check
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').then(registration => {
        console.log('SW registered:', registration.scope);
        
        // Only show update banner if SW was already active before (not first install)
        registration.addEventListener('updatefound', () => {
          const newWorker = registration.installing;
          newWorker.addEventListener('statechange', () => {
            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
              // Prevent loop: only show once per session
              if (!sessionStorage.getItem('sw_update_shown')) {
                sessionStorage.setItem('sw_update_shown', '1');
                document.getElementById('update-banner').classList.remove('hidden');
              }
            }
          });
        });
      }).catch(err => console.log('SW registration failed:', err));
    }
  </script>
  
  <!-- Mapa de Calor Script -->
  <script>
    // ============================================
    // MAPA DE CALOR (BI)
    // ============================================
    var mapaLeaflet = null;
    var markersLayer = null;
    var mapaInicializado = false;
    
    window.initMapaCalor = function(pontos, tentativa) {
      tentativa = tentativa || 0;
      
      console.log('🗺️ [INDEX] initMapaCalor chamado com', pontos ? pontos.length : 0, 'pontos, tentativa', tentativa);
      
      if (typeof L === 'undefined') {
        console.log('❌ Leaflet não carregado!');
        if (tentativa < 10) {
          setTimeout(function() { window.initMapaCalor(pontos, tentativa + 1); }, 300);
        }
        return;
      }
      
      var container = document.getElementById('mapa-calor-leaflet');
      if (!container || container.offsetWidth === 0) {
        console.log('⏳ Container não pronto, tentativa', tentativa + 1);
        if (tentativa < 20) {
          setTimeout(function() { window.initMapaCalor(pontos, tentativa + 1); }, 150);
        }
        return;
      }
      
      console.log('📐 Container:', container.offsetWidth, 'x', container.offsetHeight);
      
      if (mapaLeaflet) {
        try { mapaLeaflet.remove(); } catch(e) {}
        mapaLeaflet = null;
        markersLayer = null;
      }
      container._leaflet_id = null;
      container.innerHTML = '';
      
      try {
        mapaLeaflet = L.map('mapa-calor-leaflet').setView([-16.6869, -49.2648], 10);
        
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
          attribution: '© OpenStreetMap',
          maxZoom: 18
        }).addTo(mapaLeaflet);
        
        markersLayer = L.layerGroup().addTo(mapaLeaflet);
        mapaInicializado = true;
        console.log('✅ Mapa Leaflet criado com sucesso!');
        
      } catch(e) {
        console.error('❌ Erro ao criar mapa:', e);
        return;
      }
      
      if (!pontos || pontos.length === 0) {
        console.log('Sem pontos para exibir');
        return;
      }
      
      markersLayer.clearLayers();
      var maxCount = Math.max.apply(null, pontos.map(function(p) { return p.count || 0; }));
      var adicionados = 0;
      
      pontos.forEach(function(ponto) {
        if (!ponto.lat || !ponto.lng) return;
        adicionados++;
        
        var intensity = (ponto.count || 0) / (maxCount || 1);
        var color;
        
        if (ponto.color) {
          color = ponto.color;
        } else {
          if (intensity > 0.7) color = '#22c55e';
          else if (intensity > 0.4) color = '#f59e0b';
          else color = '#ef4444';
        }
        
        L.circle([ponto.lat, ponto.lng], {
          color: color, fillColor: color,
          fillOpacity: 0.3 + intensity * 0.3,
          radius: 300 + intensity * 1500, weight: 1
        }).bindPopup('<b>' + (ponto.cidade || ponto.bairro || 'Local') + '</b><br>📦 ' + (ponto.count || 0) + ' entregas').addTo(markersLayer);
        
        L.circleMarker([ponto.lat, ponto.lng], {
          radius: 5 + intensity * 12,
          fillColor: color, color: '#fff',
          weight: 2, opacity: 1, fillOpacity: 0.9
        }).addTo(markersLayer);
      });
      
      console.log('✅ Pontos adicionados:', adicionados);
      
      try {
        var valid = pontos.filter(function(p) { return p.lat && p.lng; });
        if (valid.length > 0) {
          mapaLeaflet.fitBounds(L.latLngBounds(valid.map(function(p) { return [p.lat, p.lng]; })), { padding: [50, 50] });
          console.log('✅ Bounds ajustados para', valid.length, 'pontos válidos');
        }
      } catch(e) { console.log('Erro ao ajustar bounds:', e); }
      
      setTimeout(function() { 
        if (mapaLeaflet) {
          mapaLeaflet.invalidateSize();
          console.log('✅ Mapa finalizado!');
          
          // DEBUG: Verificar se o mapa existe no DOM
          var container = document.getElementById('mapa-calor-leaflet');
          if (container) {
            console.log('🔍 DEBUG - Container innerHTML length:', container.innerHTML.length);
            console.log('🔍 DEBUG - Container children:', container.children.length);
            console.log('🔍 DEBUG - Container style:', container.style.cssText);
            console.log('🔍 DEBUG - mapaLeaflet._container:', mapaLeaflet._container ? 'existe' : 'NÃO EXISTE');
            
            // FORÇAR VISIBILIDADE
            container.style.zIndex = '9999';
            container.style.position = 'relative';
            container.style.visibility = 'visible';
            container.style.opacity = '1';
            container.style.display = 'block';
            container.style.overflow = 'visible';
            
            // Forçar nos filhos também
            var leafletContainer = container.querySelector('.leaflet-container');
            if (leafletContainer) {
              leafletContainer.style.zIndex = '9999';
              leafletContainer.style.visibility = 'visible';
              leafletContainer.style.opacity = '1';
              console.log('🔧 CSS forçado no leaflet-container');
            }
            
            // Forçar invalidateSize novamente
            setTimeout(function() {
              if (mapaLeaflet) {
                mapaLeaflet.invalidateSize();
                console.log('🔧 invalidateSize chamado novamente');
              }
            }, 500);
          }
        }
      }, 100);
    };
    
    window.destroyMapaCalor = function() {
      if (mapaLeaflet) {
        try { mapaLeaflet.remove(); } catch(e) {}
        mapaLeaflet = null;
        markersLayer = null;
      }
      mapaInicializado = false;
    };
    
    window.atualizarMapaCalor = function(pontos) {
      window.initMapaCalor(pontos);
    };
    
    // ============================================
    // MAPA DE CLIENTES (Localização)
    // ============================================
    var mapaClientesLeaflet = null;
    var markersClientesLayer = null;
    
    window.initMapaClientes = function(clientes, tentativa) {
      tentativa = tentativa || 0;
      
      console.log('🗺️ [INDEX] initMapaClientes chamado com', clientes ? clientes.length : 0, 'clientes');
      
      // Validar se clientes é um array
      if (!clientes || !Array.isArray(clientes)) {
        console.log('❌ clientes não é um array válido');
        return;
      }
      
      if (typeof L === 'undefined') {
        console.log('❌ Leaflet não carregado!');
        if (tentativa < 10) {
          setTimeout(function() { window.initMapaClientes(clientes, tentativa + 1); }, 300);
        }
        return;
      }
      
      var container = document.getElementById('mapa-clientes-leaflet');
      if (!container || container.offsetWidth === 0) {
        console.log('⏳ Container não pronto, tentativa', tentativa + 1);
        if (tentativa < 20) {
          setTimeout(function() { window.initMapaClientes(clientes, tentativa + 1); }, 150);
        }
        return;
      }
      
      console.log('📐 Container:', container.offsetWidth, 'x', container.offsetHeight);
      
      // Destruir mapa anterior se existir
      if (mapaClientesLeaflet) {
        try { mapaClientesLeaflet.remove(); } catch(e) {}
        mapaClientesLeaflet = null;
        markersClientesLayer = null;
      }
      container._leaflet_id = null;
      container.innerHTML = '';
      
      try {
        mapaClientesLeaflet = L.map('mapa-clientes-leaflet').setView([-16.6869, -49.2648], 10);
        
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
          attribution: '© OpenStreetMap',
          maxZoom: 18
        }).addTo(mapaClientesLeaflet);
        
        markersClientesLayer = L.layerGroup().addTo(mapaClientesLeaflet);
        var bounds = [];
        var adicionados = 0;
        
        // Adicionar marcadores para cada cliente
        for (var i = 0; i < clientes.length; i++) {
          var cliente = clientes[i];
          var end = cliente.enderecos && cliente.enderecos[0] ? cliente.enderecos[0] : null;
          if (!end || !end.latitude || !end.longitude) continue;
          
          var lat = parseFloat(end.latitude);
          var lng = parseFloat(end.longitude);
          if (isNaN(lat) || isNaN(lng) || lat === 0 || lng === 0) continue;
          
          bounds.push([lat, lng]);
          adicionados++;
          
          // Emoji baseado no cliente
          var isCliente767 = String(cliente.cod_cliente) === '767';
          var emoji = isCliente767 ? '⭐' : '🏢';
          var tamanho = isCliente767 ? 32 : 28;
          
          // Criar ícone com emoji - usando estilo inline para garantir visibilidade
          var emojiIcon = L.divIcon({
            html: '<div style="font-size:' + tamanho + 'px;cursor:pointer;transition:transform 0.2s;line-height:1;" onmouseover="this.style.transform=\'scale(1.3)\'" onmouseout="this.style.transform=\'scale(1)\'">' + emoji + '</div>',
            className: 'emoji-marker',
            iconSize: [tamanho + 4, tamanho + 4],
            iconAnchor: [(tamanho + 4)/2, (tamanho + 4)/2],
            popupAnchor: [0, -(tamanho/2)]
          });
          
          // Criar link do Waze
          var wazeLink = 'https://waze.com/ul?ll=' + lat + ',' + lng + '&navigate=yes';
          
          // Popup com informações
          var cidadeInfo = [end.bairro, end.cidade, end.estado].filter(function(x) { return x; }).join(' - ');
          var popupHtml = '<div style="min-width:220px;font-family:system-ui,sans-serif;padding:4px;">' +
            '<p style="font-weight:bold;color:#0d9488;margin:0 0 6px 0;font-size:15px;">' +
            cliente.cod_cliente + ' - ' + (cliente.nome_cliente || '') +
            '</p>' +
            (cliente.centro_custo ? '<p style="color:#7c3aed;font-size:12px;margin:0 0 6px 0;font-weight:600;">📦 ' + cliente.centro_custo + '</p>' : '') +
            '<p style="color:#555;font-size:12px;margin:0 0 6px 0;">📌 ' + (end.endereco || 'Sem endereço') + '</p>' +
            (cidadeInfo ? '<p style="color:#888;font-size:11px;margin:0 0 10px 0;">' + cidadeInfo + '</p>' : '') +
            '<a href="' + wazeLink + '" target="_blank" rel="noopener" style="display:inline-block;padding:10px 18px;background:#06b6d4;color:white;text-decoration:none;border-radius:8px;font-size:13px;font-weight:600;">🚗 Abrir no Waze</a>' +
            '</div>';
          
          // Criar marcador e adicionar popup
          var marker = L.marker([lat, lng], { 
            icon: emojiIcon,
            interactive: true,
            bubblingMouseEvents: false
          });
          
          marker.bindPopup(popupHtml, {
            maxWidth: 300,
            className: 'cliente-popup'
          });
          
          marker.addTo(markersClientesLayer);
        }
        
        console.log('✅ Adicionados', adicionados, 'marcadores ao mapa');
        
        // Ajustar zoom para mostrar todos os pontos
        if (bounds.length > 0) {
          mapaClientesLeaflet.fitBounds(bounds, { padding: [50, 50] });
        }
        
        // Forçar redimensionamento
        setTimeout(function() {
          if (mapaClientesLeaflet) {
            mapaClientesLeaflet.invalidateSize();
            console.log('✅ Mapa de clientes finalizado!');
          }
        }, 100);
        
      } catch(e) {
        console.error('❌ Erro ao criar mapa de clientes:', e);
      }
    };
    
    window.destroyMapaClientes = function() {
      if (mapaClientesLeaflet) {
        try { mapaClientesLeaflet.remove(); } catch(e) {}
        mapaClientesLeaflet = null;
        markersClientesLayer = null;
      }
    };
  </script>
